<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>生命医学主题库 - 门户</title>
  <style>
    :root {
      --bg: #f5f7fa;
      --panel: #ffffff;
      --text: #333333;
      --muted: #999999;
      --soft: #7c8ba1;
      --line: #e4ebf5;
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      --radius: 8px;
      --font: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); }
    body { font-size: 14px; line-height: 1.6; }

    /* ====== Topbar ====== */
    .portal-topbar {
      height: 58px; display: grid; grid-template-columns: 260px 1fr auto; align-items: center; gap: 18px;
      padding: 0 24px; background: #fff; border-bottom: 1px solid var(--line);
      position: sticky; top: 0; z-index: 100;
    }
    .portal-brand { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 15px; }
    .portal-mark {
      width: 28px; height: 28px; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center;
      color: #fff; background: #165dff; font-size: 14px;
    }
    .portal-search {
      height: 38px; display: flex; align-items: center; gap: 8px; padding: 0 12px;
      border: 1px solid var(--line); border-radius: 10px; background: #fafcff; color: #8b98ad;
    }
    .portal-search input { width: 100%; background: transparent; border: 0; outline: none; font: inherit; }
    .portal-user { display: flex; align-items: center; gap: 10px; color: #5d6b82; }
    .avatar {
      width: 32px; height: 32px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center;
      color: #165dff; background: #e8f3ff; font-weight: 800;
    }
    .btn {
      min-height: 36px; padding: 0 14px; border-radius: 10px; border: 0; font: inherit; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      font-weight: 700; transition: .16s ease;
    }
    .btn.danger { color: #fff; background: linear-gradient(90deg, #f45b5b, #e73d3d); }
    .btn.small { min-height: 30px; padding: 0 10px; font-size: 12px; border-radius: 8px; }
    .btn:hover { filter: brightness(1.05); }

    /* ====== Page Shell ====== */
    .page-shell { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }

    /* Page Title */
    .page-title {
      font-size: 20px; font-weight: 800; color: #000000;
      margin: 0 0 32px; line-height: 1.3;
    }

    /* Module Section */
    .module-section { margin-bottom: 48px; }
    .module-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 24px;
    }
    .module-icon {
      width: 36px; height: 36px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .module-icon svg { width: 20px; height: 20px; }
    .module-title {
      font-size: 16px; font-weight: 800; color: #333333;
      line-height: 1.3;
    }

    /* Card Grid */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 24px 16px;
    }

    /* System Card */
    .sys-card {
      background: #ffffff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      transition: box-shadow .22s ease, transform .22s ease;
      height: 100%;
    }
    .sys-card:hover {
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
      transform: translateY(-2px);
    }

    /* Cover */
    .card-cover {
      height: 110px;
      padding: 16px;
      display: flex;
      align-items: flex-start;
    }
    .cover-icon-box {
      width: 34px; height: 34px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255, 255, 255, 0.2);
      flex-shrink: 0;
    }
    .cover-icon-box svg { width: 18px; height: 18px; color: #fff; }

    /* Body */
    .card-body {
      padding: 16px;
      display: flex; flex-direction: column; flex: 1;
    }
    .card-body h3 {
      margin: 0 0 6px; font-size: 14px; font-weight: 800; color: #333333;
      line-height: 1.4;
    }
    .card-body .desc {
      margin: 0 0 16px; font-size: 12px; color: #999999;
      line-height: 1.6; flex: 1;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-foot {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px;
    }
    .card-foot .users {
      font-size: 12px; color: #999999;
      display: flex; align-items: center; gap: 4px;
    }
    .card-foot .users svg { width: 14px; height: 14px; }
    .enter-btn {
      min-height: 30px; padding: 0 14px; border: 0; border-radius: 8px;
      font: inherit; font-size: 12px; font-weight: 700; cursor: pointer;
      color: #fff;
      background: linear-gradient(90deg, #165dff, #0f9a83);
      box-shadow: 0 4px 12px rgba(22, 93, 255, 0.18);
      white-space: nowrap;
      pointer-events: none;
      transition: filter .16s ease;
    }



    /* Footer */
    .footer {
      text-align: center; padding: 32px 24px; color: var(--soft); font-size: 12px;
      border-top: 1px solid var(--line); margin-top: 24px;
    }

    /* Toast */
    .toast {
      position: fixed; left: 50%; top: 20px; z-index: 1000;
      transform: translate(-50%, -10px);
      padding: 12px 16px; min-width: 220px; max-width: 92vw;
      border-radius: 10px; background: rgba(23, 32, 49, .95); color: #fff;
      text-align: center; opacity: 0; pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
      box-shadow: 0 14px 40px rgba(41, 76, 131, 0.2);
    }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }

    @media (max-width: 1200px) {
      .card-grid, .tools-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 760px) {
      .portal-topbar { grid-template-columns: 1fr; height: auto; padding: 14px 16px; gap: 10px; }
      .portal-user { justify-content: flex-start; }
      .card-grid, .tools-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <!-- ====== 顶部导航栏 ====== -->
  <header class="portal-topbar">
    <div class="portal-brand"><span class="portal-mark">医</span><span>生命医学智能平台</span></div>
    <label class="portal-search">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.85"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg>
      <input id="portalSearch" placeholder="搜索系统或工具...">

      <span id="userName">张教授</span>
      <span id="userRole" style="font-size:12px;color:var(--soft);"></span>
      <button id="logoutBtn" class="btn danger small" type="button">退出登录</button>
    </div>
  </header>

  <!-- ====== 主体内容 ====== -->
  <section class="page-shell">

    <!-- 页面标题 -->
    <h1 class="page-title">系统与应用中心</h1>

    <!-- ======== 模块一：生命医学主题应用 ======== -->
    <div class="module-section">
      <div class="module-header">
        <div class="module-icon" style="background:#E8F5E9;">
          <svg viewBox="0 0 24 24" fill="none" stroke="#4CAF50" stroke-width="2"><path d="M20.8 4.6a5.4 5.4 0 0 0-7.6 0L12 5.8l-1.2-1.2a5.4 5.4 0 0 0-7.6 7.6L12 21l8.8-8.8a5.4 5.4 0 0 0 0-7.6Z"/><path d="M15 2c0 0-1 3-3 8"/></svg>
        </div>
        <span class="module-title">生命医学主题应用</span>
      </div>

      <div class="card-grid" id="gridModule1"></div>
    </div>

    <!-- ======== 模块二：跨领域数据应用 ======== -->
    <div class="module-section">
      <div class="module-header">
        <div class="module-icon" style="background:#E3F2FD;">
          <svg viewBox="0 0 24 24" fill="none" stroke="#2196F3" stroke-width="2"><circle cx="6" cy="8" r="3"/><circle cx="18" cy="8" r="3"/><circle cx="12" cy="18" r="3"/><path d="M8.2 9.8l2 6.2M15.8 9.8l-2 6.2"/></svg>
        </div>
        <span class="module-title">跨领域数据应用</span>
      </div>

      <div class="card-grid" id="gridModule2"></div>
    </div>

    <!-- ======== 模块三：数据工具开发 ======== -->
    <div class="module-section">
      <div class="module-header">
        <div class="module-icon" style="background:#E8F5E9;">
          <svg viewBox="0 0 24 24" fill="none" stroke="#4CAF50" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6"/><path d="M12 18v-4"/><path d="M9 15l3-3 3 3"/></svg>
        </div>
        <span class="module-title">数据工具开发</span>
      </div>
      <div class="card-grid" id="gridModule3"></div>
    </div>

  </section>

  <footer class="footer">&copy; 2026 生命医学主题库 版权所有 | 国科信生命医学智能平台</footer>

  <script>
    /* ====== Toast ====== */
    function toast(text) {
      var el = document.getElementById('toast');
      el.textContent = text;
      el.classList.add('show');
      clearTimeout(toast._timer);
      toast._timer = setTimeout(function() { el.classList.remove('show'); }, 1800);
    }

    /* ====== User Auth ====== */
    (function() {
      try {
        var user = JSON.parse(localStorage.getItem('life_med_user'));
        if (!user) { window.location.href = 'login.html'; return; }
        document.getElementById('userAvatar').textContent = user.name.charAt(0);
        document.getElementById('userName').textContent = user.name;
        document.getElementById('userRole').textContent = user.org || user.role || '';
      } catch(e) { window.location.href = 'login.html'; }
    })();

    document.getElementById('logoutBtn').addEventListener('click', function() {
      localStorage.removeItem('life_med_user');
      toast('已退出登录');
      setTimeout(function() { window.location.href = 'login.html'; }, 500);
    });

    /* ====== Search ====== */
    document.getElementById('portalSearch').addEventListener('input', function(e) {
      var keyword = e.target.value.trim().toLowerCase();
      document.querySelectorAll('.sys-card, .tool-entry').forEach(function(el) {
        el.style.display = keyword && !el.textContent.toLowerCase().includes(keyword) ? 'none' : '';
      });
    });

      bot: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="7" width="16" height="12" rx="3"/><path d="M12 3v4"/><circle cx="9" cy="13" r="1"/><circle cx="15" cy="13" r="1"/><path d="M9 17h6"/></svg>',
      dna: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 3c6 3 6 15 12 18"/><path d="M18 3C12 6 12 18 6 21"/></svg>',

    };

    /* ====== Card Builder ====== */
    function makeSysCard(icon, title, desc, link, gradient, users) {
      return '<a class="sys-card" href="' + link + '">'
        + '<div class="card-cover" style="background:' + gradient + ';">'
        +   '<div class="cover-icon-box">' + (svg[icon] || svg.file) + '</div>'
        + '</div>'
        + '<div class="card-body">'
        +   '<h3>' + title + '</h3>'
        +   '<p class="desc">' + desc + '</p>'
        +   '<div class="card-foot">'

        +       '<svg viewBox="0 0 24 24" fill="none" stroke="#999999" stroke-width="2"><circle cx="12" cy="7" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>'

        +     '<span class="enter-btn">进入系统</span>'
        +   '</div>'

        + '</a>';

        users: '3,451'
      },
      {

        gradient: 'linear-gradient(to right, #FF512F, #DD2476)',
