<script>
// ========== 数据定义 ==========
var caseIdCounter = 100;

// 疾病分类映射（用于标签颜色）
var diseaseTagMap = {
    '糖尿病视网膜病变': 'tag-red',
    '青光眼': 'tag-orange',
    'AMD': 'tag-red',
    '高血压视网膜病变': 'tag-orange',
    'RVO': 'tag-blue',
    '其他': 'tag-blue'
};

// 初始病例数据（含点赞数、评论数、Mock评论）
var cases = [
    {
        id: 1,
        title: '非增殖期糖尿病视网膜病变伴黄斑缺血 - 典型病例讨论',
        disease: '糖尿病视网膜病变',
        tag: '疑难',
        desc: '患者56岁，糖尿病10年，OCT示黄斑区缺血性改变，但FFA未见明显无灌注区，诊断存在争议...',
        author: '李医生',
        department: '眼科',
        date: '2024-05-20',
        views: 153,
        likes: 41,
        liked: false,
        comments: [
            { author: '李医生', role: '楼主', text: '补充信息：OCTA检查结果显示旁中心凹区域确实存在局部血流密度下降，支持黄斑缺血的诊断。建议对该类患者常规进行OCTA评估。', time: '2024-05-20 14:30', likes: 28 },
            { author: '赵教授', role: '专家', text: '非常有意思的病例。我同意OCTA在评估黄斑缺血方面比FFA更敏感。但需要注意：OCTA的伪影可能导致假阳性，建议结合结构OCT的en-face图像综合判断。关于治疗，如果OCTA确认存在显著缺血且视力持续下降，可以考虑抗VEGF治疗以减轻VEGF介导的血管渗漏。', time: '2024-05-20 16:15', likes: 42 },

// ========== 初始化 ==========
document.addEventListener('DOMContentLoaded', function() {
    try {
        var user = JSON.parse(localStorage.getItem('life_med_user'));
        if (user && user.name) {
            document.getElementById('headerUserName').textContent = user.name;
        }
    } catch(e) {}
    renderCaseList(cases);
});

// ========== 渲染病例列表 ==========
function renderCaseList(caseArray) {
    var container = document.getElementById('caseList');
    if (!caseArray || caseArray.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div>暂无匹配病例</div>';
        return;
    }
    var html = '';
    caseArray.forEach(function(c) {
        var tagClass = diseaseTagMap[c.disease] || 'tag-blue';
        var likeIcon = c.liked ? '❤️' : '🤍';
        var likeBtnClass = c.liked ? 'liked' : '';
        html += '<div class="discuss-item" style="flex-direction:column;align-items:stretch;">' +
            '<div style="display:flex;align-items:center;cursor:pointer;" onclick="showDetail(' + c.id + ')">' +
                '<div class="discuss-info" style="flex:1;">' +
                    '<div class="discuss-title">' +
                        '<span class="tag ' + tagClass + '">' + (c.tag || '疑难') + '</span> ' +
                        c.title +
                    '</div>' +
                    '<div class="discuss-desc">' + c.desc + '</div>' +
                '</div>' +
                '<div class="discuss-stats" style="flex-shrink:0;margin-left:16px;">' +
                    '<span>👁 ' + c.views + '</span>' +
                '</div>' +
            '</div>' +
            '<div style="display:flex;align-items:center;gap:16px;margin-top:8px;padding-left:2px;">' +
                '<button class="action-btn ' + likeBtnClass + '" onclick="event.stopPropagation();toggleLike(' + c.id + ', this)" style="font-size:13px;background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:4px;color:' + (c.liked ? 'var(--danger)' : 'var(--gray-500)') + ';">' +
                    '<span class="like-icon">' + likeIcon + '</span> <span class="like-count">' + c.likes + '</span>' +
                '</button>' +
                '<span style="font-size:13px;color:var(--gray-500);display:flex;align-items:center;gap:4px;cursor:pointer;" onclick="event.stopPropagation();showDetail(' + c.id + ')">' +
                    '💬 ' + c.comments.length + ' 评论' +
                '</span>' +
                '<span style="font-size:12px;color:var(--gray-400);margin-left:auto;">' + c.disease + '</span>' +
            '</div>' +
        '</div>';
    });
    container.innerHTML = html;
}

// ========== 搜索 + 筛选 ==========
function filterCases() {
    var keyword = document.getElementById('searchInput').value.trim().toLowerCase();
    var disease = document.getElementById('diseaseFilter').value;
    var filtered = cases.filter(function(c) {
        var matchKeyword = !keyword ||
            c.title.toLowerCase().indexOf(keyword) !== -1 ||
            c.desc.toLowerCase().indexOf(keyword) !== -1 ||
            c.disease.toLowerCase().indexOf(keyword) !== -1;
        var matchDisease = !disease || c.disease === disease;
        return matchKeyword && matchDisease;
    });
    renderCaseList(filtered);
}

// ========== 点赞/取消点赞（列表页） ==========
function toggleLike(id, btnEl) {
    var c = cases.find(function(x) { return x.id === id; });
    if (!c) return;
    c.liked = !c.liked;
    if (c.liked) {
        c.likes++;
    } else {
        c.likes--;
    }
    // 更新按钮样式
    var icon = btnEl.querySelector('.like-icon');
    var count = btnEl.querySelector('.like-count');
    icon.textContent = c.liked ? '❤️' : '🤍';
    count.textContent = c.likes;
    btnEl.classList.toggle('liked', c.liked);
    btnEl.style.color = c.liked ? 'var(--danger)' : 'var(--gray-500)';
}

// ========== 详情页 ==========
var currentDetailId = null;

function showDetail(id) {
    var c = cases.find(function(x) { return x.id === id; });
    if (!c) return;
    currentDetailId = id;
    document.getElementById('listView').style.display = 'none';
    document.getElementById('detailView').style.display = 'block';

    var tagClass = diseaseTagMap[c.disease] || 'tag-blue';
    document.getElementById('detailTag').className = 'tag ' + tagClass;
    document.getElementById('detailTag').textContent = c.tag || '疑难';
    document.getElementById('detailTitle').textContent = c.title;
    document.getElementById('detailMeta').textContent = '发布者：' + c.author + ' | 发布时间：' + c.date + ' | 科室：' + c.department + ' | 疾病分类：' + c.disease;
    document.getElementById('detailContent').innerHTML = c.content;

    // 更新点赞按钮
    document.getElementById('detailLikeIcon').textContent = c.liked ? '❤️' : '🤍';
    document.getElementById('detailLikeCount').textContent = c.likes;
    var likeBtn = document.getElementById('detailLikeBtn');
    likeBtn.style.color = c.liked ? 'var(--danger)' : 'var(--gray-500)';

    // 评论数
    document.getElementById('detailCommentCount').textContent = c.comments.length;
    renderComments(c);
}

function showList() {
    document.getElementById('detailView').style.display = 'none';
    document.getElementById('listView').style.display = 'block';
    // 刷新列表以反映最新点赞/评论数
    filterCases();
}

// ========== 详情页点赞 ==========
function toggleDetailLike() {
    if (currentDetailId === null) return;
    var c = cases.find(function(x) { return x.id === currentDetailId; });
    if (!c) return;
    c.liked = !c.liked;
    c.likes += c.liked ? 1 : -1;
    document.getElementById('detailLikeIcon').textContent = c.liked ? '❤️' : '🤍';
    document.getElementById('detailLikeCount').textContent = c.likes;
    document.getElementById('detailLikeBtn').style.color = c.liked ? 'var(--danger)' : 'var(--gray-500)';
    // 同步更新列表中的显示
    var btn = document.querySelector('.discuss-item .action-btn.liked') ||
              document.querySelector('[onclick="toggleLike(' + currentDetailId + ')"]');
    // 通过重新渲染列表来同步（如果列表可见）
    if (document.getElementById('listView').style.display !== 'none') {
        filterCases();
    }
}

// ========== 评论区展开/收起 ==========
function toggleCommentSection() {
    var section = document.getElementById('commentSection');
    if (section.style.display === 'none') {
        section.style.display = 'block';
    } else {
        section.style.display = 'none';
    }
}

// ========== 渲染评论列表 ==========
function renderComments(c) {
    var container = document.getElementById('commentList');
    document.getElementById('commentTotal').textContent = c.comments.length;
    document.getElementById('detailCommentCount').textContent = c.comments.length;
    if (c.comments.length === 0) {
        container.innerHTML = '<div style="padding:20px;text-align:center;color:var(--gray-400);font-size:13px;">暂无评论，快来发表你的见解吧</div>';
        return;
    }
    var html = '';
    c.comments.forEach(function(cm) {
        html += '<div class="comment-item">' +
            '<div class="comment-author">' + escapeHtml(cm.author) + '<span class="role-tag">' + escapeHtml(cm.role) + '</span></div>' +
            '<div class="comment-text">' + escapeHtml(cm.text) + '</div>' +
            '<div class="comment-meta">' + escapeHtml(cm.time) + ' | 👍 ' + cm.likes + '</div>' +
        '</div>';
    });
    container.innerHTML = html;
}

// ========== 提交评论 ==========
function submitComment() {
    var input = document.getElementById('newCommentInput');
    var text = input.value.trim();
    if (!text) {
        showToast('请输入评论内容');
        return;
    }
    if (currentDetailId === null) return;
    var c = cases.find(function(x) { return x.id === currentDetailId; });
    if (!c) return;

    var now = new Date();
    var timeStr = now.getFullYear() + '-' +
        String(now.getMonth()+1).padStart(2,'0') + '-' +
        String(now.getDate()).padStart(2,'0') + ' ' +
        String(now.getHours()).padStart(2,'0') + ':' +
        String(now.getMinutes()).padStart(2,'0');
    var userName = document.getElementById('headerUserName').textContent || '匿名用户';
    c.comments.unshift({
        author: userName,
        role: '参与者',
        text: text,
        time: timeStr,
        likes: 0
    });
    input.value = '';
    renderComments(c);
    showToast('评论发表成功');
}

// ========== 分享病例（修改1） ==========
function shareCase() {
    var title = document.getElementById('shareTitle').value.trim();
    var disease = document.getElementById('shareDisease').value;
    var desc = document.getElementById('shareDesc').value.trim();

    // 必填项校验
    if (!title || !disease || !desc) {
        showToast('请填写完整信息（病例标题、疾病分类、病例描述为必填项）');
        return;
    }

    var now = new Date();
    var dateStr = now.getFullYear() + '-' +
        String(now.getMonth()+1).padStart(2,'0') + '-' +
        String(now.getDate()).padStart(2,'0');
    var userName = document.getElementById('headerUserName').textContent || '匿名用户';

    // 生成内容摘要（取描述前60字）
    var summary = desc.length > 60 ? desc.substring(0, 60) + '...' : desc;

    var newCase = {
        id: caseIdCounter++,
        title: title,
        disease: disease,
        tag: '疑难',
        desc: summary,
        author: userName,
        department: '眼科',
        date: dateStr,
        views: 0,
        likes: 0,
        liked: false,
        comments: [],
        content: `<h3>病例简介</h3><p>${escapeHtml(desc)}</p>`
    };

    // 新病例插入列表顶部
    cases.unshift(newCase);

    // 清空表单
    document.getElementById('shareTitle').value = '';
    document.getElementById('shareDisease').value = '';
    document.getElementById('shareDesc').value = '';
    document.getElementById('filePreview').innerHTML = '';

    closeModal('shareModal');
    // 刷新列表显示新病例
    filterCases();
    showToast('病例分享成功！已添加到列表顶部');
}

// ========== 文件上传预览 ==========
function handleFileSelect(event) {
    var files = event.target.files;
    var preview = document.getElementById('filePreview');
    if (files.length === 0) {
        preview.innerHTML = '';
        return;
    }
    var names = [];
    for (var i = 0; i < files.length; i++) {
        names.push(files[i].name);
    }
    preview.innerHTML = '已选择 ' + files.length + ' 个文件：' + names.join('、');
}

// ========== 弹窗控制 ==========
function openModal(id) {
    var el = document.getElementById(id);
    if (el) {
        el.style.display = 'flex';
        el.classList.add('show');
    }
}
function closeModal(id) {
    var el = document.getElementById(id);
    if (el) {
        el.style.display = 'none';
        el.classList.remove('show');
    }
}

// ========== 侧边栏 ==========
function toggleSubmenu(el) {
    el.classList.toggle('expanded');
    var sub = el.nextElementSibling;
    if (sub && sub.classList.contains('submenu')) {
        sub.classList.toggle('open');
    }
}

// ========== 退出 ==========
function logout() {
    if (confirm('确定要退出登录吗？')) {
        localStorage.removeItem('life_med_user');
        window.location.href = 'login.html';
    }
}

// ========== Toast 提示 ==========
function showToast(msg) {
    var toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(function() {
        toast.classList.remove('show');
    }, 2500);
}

// ========== HTML 转义 ==========
function escapeHtml(text) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(text));
    return div.innerHTML;
}

// 点击弹窗外部关闭
document.addEventListener('click', function(e) {
    if (e.target.classList.contains('modal-overlay')) {
        e.target.style.display = 'none';
        e.target.classList.remove('show');
    }
});
</script>
