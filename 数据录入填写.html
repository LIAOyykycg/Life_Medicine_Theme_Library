<script>
/* ====== 工具函数 ====== */
function formatDateTime() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0') + ' ' +
         String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0') + ':' + String(d.getSeconds()).padStart(2,'0');
}
function formatDate() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function generateRecordId() {
  var dt = new Date();
  var prefix = 'P-' + dt.getFullYear() + String(dt.getMonth()+1).padStart(2,'0') + String(dt.getDate()).padStart(2,'0');
  var records = getRecords();
  var maxNum = 0;
  for (var i = 0; i < records.length; i++) {
    if (records[i].id.indexOf(prefix) === 0) {
      var num = parseInt(records[i].id.replace(prefix,''), 10);
      if (num > maxNum) maxNum = num;
    }
  }
  return prefix + String(maxNum + 1).padStart(3, '0');
}

function logout() { if (confirm('确定要退出登录吗？')) { localStorage.removeItem('life_med_user'); window.location.href = 'login.html'; } }

/* ====== Toast ====== */
function showToast(msg, isSuccess) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isSuccess ? ' toast-success' : '');
  t.classList.add('show');
  clearTimeout(t._timeout);
  t._timeout = setTimeout(function(){ t.classList.remove('show'); }, 2000);
}

/* ====== 数据读写 ====== */
function getRecords() {
  try { return JSON.parse(localStorage.getItem('life_med_records')) || []; } catch(e) { return []; }
}
function saveRecords(arr) { localStorage.setItem('life_med_records', JSON.stringify(arr)); }

function getTemplates() {
  try { return JSON.parse(localStorage.getItem('life_med_templates')) || []; } catch(e) { return []; }
}
function saveTemplates(arr) { localStorage.setItem('life_med_templates', JSON.stringify(arr)); }

/* ====== 确保模板包含fields ====== */
function ensureTemplateFields() {
  var templates = getTemplates();
  var changed = false;
  var defaultFieldsMap = {
    '青光眼初诊评估表': [
      { type: 'text', label: '姓名', required: true },
      { type: 'radio', label: '性别', required: true, options: ['男', '女'] },
      { type: 'number', label: '年龄', required: true, unit: '岁' },
      { type: 'date', label: '就诊日期', required: true },
      { type: 'text', label: '病历号', required: false },
      { type: 'select', label: '眼别', required: true, options: ['左眼', '右眼', '双眼'] },
      { type: 'number', label: '眼压', required: true, unit: 'mmHg' },
      { type: 'number', label: '视力', required: false, unit: '' },
      { type: 'textarea', label: '主诉', required: true },
      { type: 'textarea', label: '诊断意见', required: false }
    ],
    '糖尿病视网膜病变筛查表': [
      { type: 'text', label: '姓名', required: true },
      { type: 'radio', label: '性别', required: true, options: ['男', '女'] },
      { type: 'number', label: '年龄', required: true, unit: '岁' },
      { type: 'date', label: '筛查日期', required: true },
      { type: 'number', label: '糖尿病病程', required: true, unit: '年' },
      { type: 'number', label: '糖化血红蛋白', required: false, unit: '%' },
      { type: 'select', label: '视网膜病变分期', required: true, options: ['无', '轻度NPDR', '中度NPDR', '重度NPDR', 'PDR'] },
      { type: 'textarea', label: '眼底检查所见', required: true },
      { type: 'textarea', label: '处理建议', required: false }
    ],
    '黄斑变性评估表': [
      { type: 'text', label: '姓名', required: true },
      { type: 'radio', label: '性别', required: true, options: ['男', '女'] },
      { type: 'number', label: '年龄', required: true, unit: '岁' },
      { type: 'date', label: '评估日期', required: true },
      { type: 'select', label: '黄斑变性类型', required: true, options: ['干性', '湿性'] },
      { type: 'select', label: '眼别', required: true, options: ['左眼', '右眼', '双眼'] },
      { type: 'number', label: '最佳矫正视力', required: true, unit: '' },
      { type: 'textarea', label: 'OCT检查结果', required: true },
      { type: 'textarea', label: '治疗建议', required: false }
    ]
  };

  for (var i = 0; i < templates.length; i++) {
    if (!templates[i].fields && defaultFieldsMap[templates[i].name]) {
      templates[i].fields = defaultFieldsMap[templates[i].name];
      changed = true;
    }
  }

  /* 确保三个核心模板存在 */

var currentView = 'list';
var editingRecordId = null;
var selectedTemplate = null;
var viewMode = null; /* 'edit' | 'view' */

function showList() {
  currentView = 'list';
  document.getElementById('listSection').style.display = 'block';
  document.getElementById('formSection').style.display = 'none';
  editingRecordId = null;
  selectedTemplate = null;
  viewMode = null;
}

function showFormSection() {
  currentView = 'form';
  document.getElementById('listSection').style.display = 'none';
  document.getElementById('formSection').style.display = 'block';
}

/* ====== 列表页 ====== */
var listCurrentPage = 1;
var listPageSize = 7;

function getFilteredRecords() {
  var records = getRecords();
  var searchKw = (document.getElementById('filterSearch').value || '').trim().toLowerCase();
  var dateFrom = document.getElementById('filterDateFrom').value;
  var dateTo = document.getElementById('filterDateTo').value;
  var statusFilter = document.getElementById('filterStatus').value;
  var diagnosisFilter = document.getElementById('filterDiagnosis').value;

  return records.filter(function(r) {
    if (searchKw) {
      var searchText = (r.id + ' ' + r.patientName + ' ' + r.diagnosis).toLowerCase();
      if (searchText.indexOf(searchKw) === -1) return false;
    }
    if (dateFrom && r.enterDate < dateFrom) return false;
    if (dateTo && r.enterDate > dateTo) return false;
    if (statusFilter && r.status !== statusFilter) return false;
    if (diagnosisFilter && r.diagnosis !== diagnosisFilter) return false;
    return true;
  });
}

function buildDiagnosisOptions() {
  var records = getRecords();
  var set = {};
  for (var i = 0; i < records.length; i++) {
    if (records[i].diagnosis) set[records[i].diagnosis] = true;
  }
  var opts = Object.keys(set).sort();
  var sel = document.getElementById('filterDiagnosis');
  var html = '<option value="">全部</option>';
  for (var j = 0; j < opts.length; j++) {
    html += '<option value="' + opts[j] + '">' + opts[j] + '</option>';
  }
  sel.innerHTML = html;
}

function renderTable() {
  var filtered = getFilteredRecords();
  var totalPages = Math.ceil(filtered.length / listPageSize) || 1;
  if (listCurrentPage > totalPages) listCurrentPage = totalPages;
  var start = (listCurrentPage - 1) * listPageSize;
  var pageData = filtered.slice(start, start + listPageSize);

  var tbody = document.getElementById('recordTableBody');
  var html = '';
  for (var i = 0; i < pageData.length; i++) {
    var r = pageData[i];
    var statusTag;
    if (r.status === '已通过') statusTag = '<span class="tag tag-green">已通过</span>';
    else if (r.status === '待审核') statusTag = '<span class="tag tag-orange">待审核</span>';
    else if (r.status === '已驳回') statusTag = '<span class="tag tag-red">已驳回</span>';
    else statusTag = '<span class="tag tag-gray">草稿</span>';

    var actions = '<div class="action-links">';
    if (r.status !== '已通过') {
      actions += '<a onclick="editRecord(\'' + r.id + '\')">编辑</a><span class="action-sep">|</span>';
    }
    actions += '<a onclick="viewRecord(\'' + r.id + '\')">查看</a><span class="action-sep">|</span>';
    actions += '<a class="danger" onclick="deleteRecord(\'' + r.id + '\')">删除</a>';
    actions += '</div>';

    html += '<tr><td>' + r.id + '</td><td>' + r.patientName + '</td><td>' + r.gender + '</td><td>' + r.diagnosis + '</td><td>' + r.enterDate + '</td><td>' + statusTag + '</td><td>' + actions + '</td></tr>';
  }
  tbody.innerHTML = html;

  /* 分页 */
  var navHtml = '';
  navHtml += '<button ' + (listCurrentPage === 1 ? 'disabled' : 'onclick="goPage(' + (listCurrentPage - 1) + ')"') + '>上一页</button>';
  for (var p = 1; p <= totalPages; p++) {
    navHtml += '<button class="' + (p === listCurrentPage ? 'active' : '') + '" onclick="goPage(' + p + ')"' + '>' + p + '</button>';
  }
  navHtml += '<button ' + (listCurrentPage === totalPages ? 'disabled' : 'onclick="goPage(' + (listCurrentPage + 1) + ')"') + '>下一页</button>';
  document.getElementById('paginationNav').innerHTML = navHtml;

  buildDiagnosisOptions();
}

function goPage(p) {
  listCurrentPage = p;
  renderTable();
}

function applyFilters() {
  listCurrentPage = 1;
  renderTable();
}

function resetFilters() {
  document.getElementById('filterSearch').value = '';
  document.getElementById('filterDateFrom').value = '';
  document.getElementById('filterDateTo').value = '';
  document.getElementById('filterStatus').value = '';
  document.getElementById('filterDiagnosis').value = '';
  listCurrentPage = 1;
  renderTable();
}

function backToList() {
  showList();
  renderTable();
}

/* ====== 删除记录 ====== */
function deleteRecord(id) {
  var records = getRecords();
  var target = null;
  for (var i = 0; i < records.length; i++) {
    if (records[i].id === id) { target = records[i]; break; }
  }
  if (!target) return;
  if (!confirm('确定要删除患者「' + target.patientName + '」的录入记录吗？')) return;
  for (var j = 0; j < records.length; j++) {
    if (records[j].id === id) { records.splice(j, 1); break; }
  }
  saveRecords(records);
  renderTable();
  showToast('记录已删除', true);
}

/* ====== 新增录入：模板选择 ====== */
function openNewRecord() {
  editingRecordId = null;
  selectedTemplate = null;
  viewMode = null;
  showFormSection();
  document.getElementById('templateSelectStep').style.display = 'block';
  document.getElementById('formFillStep').style.display = 'none';
  renderTemplateCards();
}

function renderTemplateCards() {
  var templates = getTemplates();
  var enabled = [];
  for (var i = 0; i < templates.length; i++) {
    if (templates[i].status === '启用') enabled.push(templates[i]);
  }

  var grid = document.getElementById('templateGrid');
  var empty = document.getElementById('emptyTemplates');

  if (enabled.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  var html = '';
  for (var j = 0; j < enabled.length; j++) {
    var t = enabled[j];
    html += '<div class="template-card" onclick="selectTemplate(\'' + t.id + '\')">'
      + '<div class="tpl-name">' + t.name + '</div>'
      + '<div class="tpl-meta"><span class="tag tag-blue">' + (t.type || '评估类') + '</span></div>'
      + '<div class="tpl-scene">适用场景：' + (t.scene || '未指定') + '</div>'
      + '<div class="tpl-version">版本：' + (t.version || 'v1.0.0') + '</div>'
      + '</div>';
  }
  grid.innerHTML = html;
}

function selectTemplate(templateId) {
  var templates = getTemplates();
  for (var i = 0; i < templates.length; i++) {
    if (templates[i].id === templateId) {
      selectedTemplate = templates[i];
      break;
    }
  }
  if (!selectedTemplate) { showToast('模板未找到'); return; }
  if (!selectedTemplate.fields || selectedTemplate.fields.length === 0) {
    showToast('该模板未配置字段，请先在表单模板设置中完善');
    return;
  }

  document.getElementById('templateSelectStep').style.display = 'none';
  document.getElementById('formFillStep').style.display = 'block';
  document.getElementById('formFillTitle').textContent = selectedTemplate.name;
  document.getElementById('formFillVersion').textContent = '版本: ' + (selectedTemplate.version || 'v1.0.0');
  renderFormFields();
}

/* ====== 编辑/查看记录 ====== */
function editRecord(id) {
  var records = getRecords();
  for (var i = 0; i < records.length; i++) {
    if (records[i].id === id) { editingRecordId = id; break; }
  }
  viewMode = 'edit';
  enterFormFillFromRecord();
}

function viewRecord(id) {
  var records = getRecords();
  for (var i = 0; i < records.length; i++) {
    if (records[i].id === id) { editingRecordId = id; break; }
  }
  viewMode = 'view';
  enterFormFillFromRecord();
}

function enterFormFillFromRecord() {
  var records = getRecords();
  var record = null;
  for (var i = 0; i < records.length; i++) {
    if (records[i].id === editingRecordId) { record = records[i]; break; }
  }
  if (!record) { showToast('记录未找到'); backToList(); return; }

  selectedTemplate = {
    id: record.templateId,
    name: record.templateName,
    fields: record.fields,
    version: 'v1.0.0'
  };

  showFormSection();
  document.getElementById('templateSelectStep').style.display = 'none';
  document.getElementById('formFillStep').style.display = 'block';
  document.getElementById('formFillTitle').textContent = record.templateName;
  document.getElementById('formFillVersion').textContent = '版本: v1.0.0';
  renderFormFields();
}

function backToTemplateSelect() {
  if (editingRecordId) {
    backToList();
    return;
  }
  document.getElementById('templateSelectStep').style.display = 'block';
  document.getElementById('formFillStep').style.display = 'none';
  selectedTemplate = null;
  renderTemplateCards();
}

/* ====== 表单字段渲染 ====== */
function renderFormFields() {
  var fields = selectedTemplate.fields;
  var formData = {};
  if (editingRecordId) {
    var records = getRecords();
    for (var i = 0; i < records.length; i++) {
      if (records[i].id === editingRecordId) { formData = records[i].formData || {}; break; }
    }
  }

  var container = document.getElementById('formFieldsContainer');
  var html = '';
  for (var j = 0; j < fields.length; j++) {
    var f = fields[j];
    var val = formData[f.label] || '';
    var requiredStar = f.required ? '<span class="required-star">*</span>' : '';
    var disabledAttr = (viewMode === 'view') ? ' disabled' : '';
    var readonlyAttr = (viewMode === 'view') ? ' readonly' : '';

    html += '<div class="form-field-item">';
    html += '<div class="ff-label">' + f.label + requiredStar + '</div>';

    switch (f.type) {
      case 'text':
        html += '<input type="text" id="ff_' + j + '" value="' + escapeHtml(val) + '" placeholder="请输入' + f.label + '"' + disabledAttr + readonlyAttr + '>';
        break;
      case 'textarea':
        html += '<textarea id="ff_' + j + '" rows="4" placeholder="请输入' + f.label + '"' + disabledAttr + readonlyAttr + '>' + escapeHtml(val) + '</textarea>';
        break;
      case 'select':
        html += '<select id="ff_' + j + '"' + disabledAttr + '>';
        html += '<option value="">请选择' + f.label + '</option>';
        var opts = f.options || [];
        for (var o = 0; o < opts.length; o++) {
          html += '<option value="' + escapeHtml(opts[o]) + '"' + (val === opts[o] ? ' selected' : '') + '>' + opts[o] + '</option>';
        }
        html += '</select>';
        break;
      case 'radio':
        html += '<div class="ff-radio-group">';
        var rOpts = f.options || [];
        for (var r = 0; r < rOpts.length; r++) {
          html += '<label><input type="radio" name="ff_' + j + '" value="' + escapeHtml(rOpts[r]) + '"' + (val === rOpts[r] ? ' checked' : '') + disabledAttr + '>' + rOpts[r] + '</label>';
        }
        html += '</div>';
        break;
      case 'checkbox':
        html += '<div class="ff-checkbox-group">';
        var cOpts = f.options || [];
        var checkedVals = (typeof val === 'string') ? val.split(',').map(function(s){ return s.trim(); }) : [];
        for (var c = 0; c < cOpts.length; c++) {
          html += '<label><input type="checkbox" name="ff_' + j + '" value="' + escapeHtml(cOpts[c]) + '"' + (checkedVals.indexOf(cOpts[c]) !== -1 ? ' checked' : '') + disabledAttr + '>' + cOpts[c] + '</label>';
        }
        html += '</div>';
        break;
      case 'date':
        html += '<input type="date" id="ff_' + j + '" value="' + escapeHtml(val) + '"' + disabledAttr + '>';
        break;
      case 'number':
        html += '<div class="ff-number-wrap">';
        html += '<input type="number" id="ff_' + j + '" value="' + escapeHtml(val) + '" placeholder="请输入' + f.label + '"' + disabledAttr + '>';
        if (f.unit) html += '<span class="ff-unit">' + f.unit + '</span>';
        html += '</div>';
        break;
      case 'upload':
        html += '<div class="ff-upload-area">点击或拖拽文件到此上传</div>';
        break;
      default:
        html += '<input type="text" id="ff_' + j + '" value="' + escapeHtml(val) + '" placeholder="请输入' + f.label + '"' + disabledAttr + readonlyAttr + '>';
    }

    html += '<div class="ff-error" id="ff_err_' + j + '"></div>';
    html += '</div>';
  }
  container.innerHTML = html;

  /* 底部操作栏 */
  var actionsBar = document.getElementById('formActionsBar');
  if (viewMode === 'view') {
    actionsBar.innerHTML = '<button class="btn btn-outline" onclick="backToList()">返回列表</button>';
  } else {
    actionsBar.innerHTML = '<button class="btn btn-outline" onclick="saveDraft()">保存草稿</button>'
      + '<div><button class="btn btn-primary" onclick="submitRecord()">提交</button></div>';
  }
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

/* ====== 收集表单数据 ====== */
function collectFormData() {
  var fields = selectedTemplate.fields;
  var formData = {};
  for (var i = 0; i < fields.length; i++) {
    var f = fields[i];
    if (f.type === 'radio') {
      var radio = document.querySelector('input[name="ff_' + i + '"]:checked');
      formData[f.label] = radio ? radio.value : '';
    } else if (f.type === 'checkbox') {
      var checkboxes = document.querySelectorAll('input[name="ff_' + i + '"]:checked');
      var vals = [];
      checkboxes.forEach(function(cb){ vals.push(cb.value); });
      formData[f.label] = vals.join(', ');
    } else if (f.type === 'upload') {
      formData[f.label] = '';
    } else {
      var el = document.getElementById('ff_' + i);
      formData[f.label] = el ? el.value : '';
    }
  }
  return formData;
}

/* ====== 保存草稿 ====== */
function saveDraft() {
  var formData = collectFormData();
  var records = getRecords();
  var now = formatDateTime();

  if (editingRecordId) {
    for (var i = 0; i < records.length; i++) {
      if (records[i].id === editingRecordId) {
        records[i].formData = formData;
        records[i].updateTime = now;
        records[i].patientName = formData['姓名'] || records[i].patientName;
        records[i].gender = formData['性别'] || records[i].gender;
        if (records[i].status !== '已通过') records[i].status = '草稿';
        break;
      }
    }
  } else {
    var patientName = formData['姓名'] || '未命名';
    var gender = formData['性别'] || '';
    var newId = generateRecordId();
    records.push({
      id: newId,
      templateId: selectedTemplate.id,
      templateName: selectedTemplate.name,
      patientName: patientName,
      gender: gender,
      diagnosis: selectedTemplate.scene || '',
      formData: formData,
      fields: selectedTemplate.fields,
      status: '草稿',
      enterDate: formatDate(),
      updateTime: now,
      creator: '张教授'
    });
    editingRecordId = newId;
  }

  saveRecords(records);
  showToast('草稿保存成功', true);
}

/* ====== 提交记录 ====== */
function submitRecord() {
  var fields = selectedTemplate.fields;
  var formData = collectFormData();
  var errors = [];

  for (var i = 0; i < fields.length; i++) {
    var f = fields[i];
    var errEl = document.getElementById('ff_err_' + i);
    if (errEl) errEl.style.display = 'none';

    if (f.required) {
      var val = formData[f.label];
      if (!val || (typeof val === 'string' && val.trim() === '')) {
        if (errEl) { errEl.textContent = '请填写' + f.label; errEl.style.display = 'block'; }
        errors.push(f.label);
      }
    }
  }

  if (errors.length > 0) {
    showToast('请填写所有必填字段');
    return;
  }

  var records = getRecords();
  var now = formatDateTime();

  if (editingRecordId) {
    for (var j = 0; j < records.length; j++) {
      if (records[j].id === editingRecordId) {
        records[j].formData = formData;
        records[j].updateTime = now;
        records[j].patientName = formData['姓名'] || records[j].patientName;
        records[j].gender = formData['性别'] || records[j].gender;
        records[j].status = '待审核';
        break;
      }
    }
  } else {
    var patientName = formData['姓名'] || '未命名';
    var gender = formData['性别'] || '';
    var newId = generateRecordId();
    records.push({
      id: newId,
      templateId: selectedTemplate.id,
      templateName: selectedTemplate.name,
      patientName: patientName,
      gender: gender,
      diagnosis: selectedTemplate.scene || '',
      formData: formData,
      fields: selectedTemplate.fields,
      status: '待审核',
      enterDate: formatDate(),
      updateTime: now,
      creator: '张教授'
    });
  }

  saveRecords(records);
  showToast('提交成功，待审核', true);
  backToList();
}
